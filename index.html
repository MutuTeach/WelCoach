/* ══ STATE ══ */
let API_KEY = '';
let currentLang = 'en';
let setupLang = 'en';
const history = [];

/* ══ SETUP LANGUAGE ══ */
function setSetupLang(lang, btn) {
  setupLang = lang;
  document.querySelectorAll('.lang-btn-setup').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const u = UI[lang];
  document.getElementById('setupSub').textContent = u.setupSub;
  document.getElementById('apiLabel').textContent = u.apiLabel;
  document.getElementById('startBtn').textContent = u.startBtn;
  document.getElementById('setupHint').innerHTML = u.setupHint;
}

/* ══ START APP ══ */
function startApp() {
  const key = document.getElementById('apiKeyInput').value.trim();
  const err = document.getElementById('setupError');
  if (!key.startsWith('sk-ant-')) {
    err.textContent = UI[setupLang].setupError;
    err.style.display = 'block';
    return;
  }
  API_KEY = key;
  currentLang = setupLang;
  err.style.display = 'none';
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'flex';
  renderApp();
}

/* ══ RENDER APP ══ */
function renderApp() {
  const u = UI[currentLang];
  document.getElementById('headerTagline').textContent = u.tagline;
  document.getElementById('onlineText').textContent = u.online;
  document.getElementById('exitBtn').textContent = u.exit;
  document.getElementById('userInput').placeholder = u.placeholder;
  document.getElementById('btnEN').classList.toggle('active', currentLang === 'en');
  document.getElementById('btnES').classList.toggle('active', currentLang === 'es');

  // Welcome card
  const chatArea = document.getElementById('chatArea');
  chatArea.innerHTML = '';
  const card = document.createElement('div');
  card.className = 'welcome-card';
  card.innerHTML = `
    <h2>${u.welcomeTitle}</h2>
    <p>${u.welcomeText}</p>
    <div class="topic-grid">
      ${u.topics.map(t => `
        <button class="topic-btn" onclick="fillInput('${t.q.replace(/'/g, "\\'")}')">
          <span class="icon">${t.icon}</span>
          <div class="ttext"><strong>${t.title}</strong><span>${t.sub}</span></div>
        </button>`).join('')}
    </div>`;
  chatArea.appendChild(card);

  // Quick replies
  const qr = document.getElementById('quickReplies');
  qr.innerHTML = u.quickReplies.map(r =>
    `<button class="qr-btn" onclick="fillInput('${r.q.replace(/'/g, "\\'")}')">${r.icon} ${r.text}</button>`
  ).join('');
}

/* ══ SWITCH LANG ══ */
function switchLang(lang) {
  currentLang = lang;
  history.length = 0;
  renderApp();
}

/* ══ RESET ══ */
function resetApp() {
  API_KEY = '';
  history.length = 0;
  currentLang = 'en';
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('setupScreen').style.display = 'flex';
  document.getElementById('apiKeyInput').value = '';
}

/* ══ CHAT ══ */
function fillInput(text) {
  const el = document.getElementById('userInput');
  el.value = text;
  autoResize(el);
  el.focus();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function addMsg(role, text) {
  const area = document.getElementById('chatArea');
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  const av = document.createElement('div');
  av.className = `av ${role}`;
  av.textContent = role === 'ai' ? '🏆' : '👤';
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
  wrap.appendChild(av);
  wrap.appendChild(bub);
  area.appendChild(wrap);
  area.scrollTop = area.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const btn = document.getElementById('sendBtn');
  const tw = document.getElementById('typingWrap');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  btn.disabled = true;

  addMsg('user', text);
  history.push({ role: 'user', content: text });
  document.getElementById('quickReplies').style.display = 'none';
  tw.style.display = 'block';
  document.getElementById('chatArea').scrollTop = 99999;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        system: SYSTEMS[currentLang],
        messages: history
      })
    });
    const data = await res.json();
    if (data.error) {
      tw.style.display = 'none';
      addMsg('ai', `⚠️ ${data.error.message}`);
      btn.disabled = false;
      return;
    }
    const reply = data.content?.[0]?.text || 'No response received.';
    history.push({ role: 'assistant', content: reply });
    tw.style.display = 'none';
    addMsg('ai', reply);
  } catch {
    tw.style.display = 'none';
    addMsg('ai', currentLang === 'en'
      ? '⚠️ Connection error. Please check your internet and try again.'
      : '⚠️ Error de conexión. Verifica tu internet e intenta de nuevo.');
  }

  btn.disabled = false;
  input.focus();
}
</script>
